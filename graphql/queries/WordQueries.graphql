extend type Query {
    words(
        first: Int @rules(apply: ["min:1", "max:100"])
        page: Int
        search: String @scope(name: "search")
        category: String @scope(name: "filterByCategory")
        sort: WordSort = ALPHA_ASC @scope(name: "sortBy")
    ): [Word!]! @paginate(model: "App\\Models\\Word", defaultCount: 15) @cache(maxAge: 86400)

    word(id: ID! @whereKey): Word @find(model: "App\\Models\\Word") @cache(maxAge: 86400)
}