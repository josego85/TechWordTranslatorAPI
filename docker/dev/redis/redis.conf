# JWT Blacklist security: never evict keys when memory is full.
# If Redis runs out of memory, it returns errors instead of silently
# deleting blacklisted tokens (which would make revoked tokens valid again).
maxmemory-policy noeviction

# AOF persistence: blacklist entries survive Redis restarts.
# Without this, a Redis restart invalidates all logout/refresh operations.
appendonly yes
appendfsync everysec
